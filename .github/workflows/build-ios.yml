name: Build iOS IPA

on:
push:
branches:
- master
workflow_dispatch:

jobs:
build:
runs-on: macos-latest


steps:
  - uses: actions/checkout@v4

  - uses: subosito/flutter-action@v2
    with:
      channel: stable

  - run: flutter --version
  - run: flutter clean
  - run: flutter pub get

  - name: Install Pods
    run: |
      cd ios
      pod install --repo-update

  - name: Disable signing
    run: |
      sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj

  - name: Prepare project
    run: flutter build ios --config-only

  - name: Build app
    run: |
      cd ios
      xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO build

  - name: Create IPA
    run: |
      mkdir -p build/ios/ipa
      cp -r build/ios/Release-iphoneos/Runner.app build/ios/ipa/
      cd build/ios/ipa
      mkdir Payload
      mv Runner.app Payload/
      zip -r voskhod.ipa Payload

  - uses: actions/upload-artifact@v4
    with:
      name: voskhod-ios
      path: build/ios/ipa/voskhod.ipa


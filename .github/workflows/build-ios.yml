name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Clean iOS Pods
        run: |
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          cd ios
          pod install --repo-update
      - name: Disable code signing
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
      

      - name: Build iOS app (no signing)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cp -r build/ios/Release-iphoneos/Runner.app build/ios/ipa/
          cd build/ios/ipa
          mkdir Payload
          mv Runner.app Payload/
          zip -r voskhod.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: voskhod-ios
          path: build/ios/ipa/voskhod.ipa
name: voskhod_vpn_client
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray_plus: ^1.1.3
  flutter_secure_storage: ^9.2.4   # фиксируем стабильную версию
  crypto: ^3.0.3
  dio: ^5.4.0
  provider: ^6.1.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/day.png
    - assets/icon/night.png
    - assets/icon/app_icon.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.jpg"
  min_sdk_android: 21